<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Getting Started · Shail's Java Mastery</title>
<link rel="stylesheet" href="assets/styles.css" />
<script>
(function () {
  try {
    var p = localStorage.getItem('sjm-theme') || 'auto';
    var dark = p === 'dark' || (p === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme-pref', p);
  } catch (e) {}
})();
</script>
</head>
<body>

<header class="topbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">☰</button>
  <div class="brand">
    <a href="index.html">
      
      <span class="brand-name">Shail's Java Mastery</span>
    </a>
  </div>
  <div class="search">
    <span>🔍</span>
    <input type="text" placeholder="Search the course…" />
  </div>
  <div class="header-right">
    <nav class="topnav">
      <a href="#">Roadmap</a>
      <a href="#">Projects</a>
      <a href="#">Interview Prep</a>
    </nav>
    <div class="theme-toggle" role="group" aria-label="Color theme">
      <button data-theme-choice="light" title="Day">☀</button>
      <button data-theme-choice="auto" title="Auto (match system)">A</button>
      <button data-theme-choice="dark" title="Night">☾</button>
    </div>
  </div>
</header>

<button id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top">↑</button>
<div class="layout">
  <nav class="modules" id="moduleNav"></nav>
  <main class="content" id="content"></main>
  <aside class="toc" id="pageToc">

    <ul id="tocList"></ul>
  </aside>
</div>
<div class="backdrop" id="backdrop"></div>

<script src="assets/site.js"></script>

<script src="content/java-fundamentals.js"></script>
<script src="content/oop.js"></script>
<script>initModulePage('getting-started');</script>
</body>
</html>
